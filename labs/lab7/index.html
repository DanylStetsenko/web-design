<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>З Новим Роком!</title>
    <link href="https://fonts.googleapis.com/css2?family=Mountains+of+Christmas:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <main class="card-container">
        <article class="card">
            <header class="card__header">
                <h1 class="card__title">Happy New Year</h1>
                <div class="card__decoration card__decoration--snow"></div>
            </header>
            
            <section class="card__body">
                <p class="card__text">Нехай 2026 рік принесе мир, натхнення та безліч успішних коммітів!</p>
                <div class="card__illustration">🎄</div>
            </section>
            
            <footer class="card__footer">
                <button class="card__button card__button--primary">Надіслати вітання</button>
            </footer>
        </article>
    </main>
</body>
</html>
