<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Лабораторна робота №1 | Форма реєстрації</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .registration-form {
            max-width: 400px;
            padding: 25px;

            margin: 40px auto;
            position: relative;

            background: #ffffff;
            color: #2c3e50;

            border-radius: 12px;

            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.15);

            border: none;
        }
    </style>
</head>

<body>
    <header>
        <h1>Лабораторна робота №1</h1>
        <p>Тема: Створення HTML-форм</p>
    </header>

    <nav>
        <ul>
            <li><a href="../index.html#labs">Повернутися до списку лабораторних</a></li>
        </ul>
    </nav>

    <main>
        <section>
            <h2>Форма реєстрації</h2>
            <form action="https://webhook.site/1e6cef8e-e01e-414d-a487-48c022c18098" method="POST"
                class="registration-form">

                <div class="form-group">
                    <label for="first_name">Ім'я:</label>
                    <input type="text" id="first_name" name="first_name" required>
                </div>

                <div class="form-group">
                    <label for="last_name">Прізвище:</label>
                    <input type="text" id="last_name" name="last_name" required>
                </div>

                <div class="form-group">
                    <label for="email">Електронна пошта:</label>
                    <input type="email" id="email" name="user_email" required>
                </div>

                <div class="form-group">
                    <label for="password">Пароль:</label>
                    <input type="password" id="password" name="user_password" required>
                </div>

                <div class="form-group">
                    <label for="confirm_password">Підтвердження паролю:</label>
                    <input type="password" id="confirm_password" name="confirm_password" required>
                </div>

                <div class="form-group">
                    <label for="birth_date">Дата народження:</label>
                    <input type="date" id="birth_date" name="birth_date">
                </div>

                <div class="form-group">
                    <label for="gender">Стать:</label>
                    <select id="gender" name="gender">
                        <option value="male">Чоловіча</option>
                        <option value="female">Жіноча</option>
                    </select>
                </div>

                <div class="form-group">
                    <input type="submit" value="Відправити дані" class="submit-btn">
                </div>

            </form>
        </section>
    </main>

    <footer>
        <p><a href="../index.html">На головну сторінку</a></p>
    </footer>
</body>

</html>
